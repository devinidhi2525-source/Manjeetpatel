<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Fashion Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#f5f7fa;color:#333}
header{background:#111;color:#fff;padding:15px;text-align:center}
h1{margin:5px 0}
.tagline{font-size:14px;color:#ccc}
.container{padding:10px}
.filters{display:flex;gap:10px;overflow:auto;margin-bottom:10px}
.filters button{padding:8px 12px;border:none;border-radius:20px;background:#ddd;cursor:pointer}
.filters button.active{background:#111;color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.card{background:#fff;border-radius:10px;padding:10px;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
.card img{width:100%;border-radius:8px}
.card h4{margin:5px 0;font-size:14px}
.price{color:#111;font-weight:600}
button.add{width:100%;padding:8px;border:none;background:#111;color:#fff;border-radius:6px;margin-top:5px}
.cart-btn{position:fixed;bottom:20px;right:20px;background:#111;color:#fff;padding:12px 16px;border-radius:50px;cursor:pointer}
.cart-count{background:red;border-radius:50%;padding:2px 6px;margin-left:5px}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;justify-content:center;align-items:center}
.modal-content{background:#fff;padding:15px;width:90%;max-height:90%;overflow:auto;border-radius:10px}
.item{display:flex;justify-content:space-between;margin:10px 0}
.qty button{margin:0 3px}
.total{font-weight:bold;margin-top:10px}
.checkout{width:100%;padding:10px;background:green;color:#fff;border:none;margin-top:10px}
.whatsapp{position:fixed;bottom:20px;left:20px;background:#25D366;color:#fff;padding:10px 15px;border-radius:30px;text-decoration:none}
</style>
</head>
<body>
<header>
<h1>Premium Fashion Store</h1>
<div class="tagline">Stylish Suits delivered to your door</div>
</header><div class="container">
<div class="filters">
<button class="active" onclick="filter('all')">All</button
